<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS実務クイズ — practical.exe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0f1c;
    --bg-grid: #0d1424;
    --panel: #121a2b;
    --panel-alt: #182236;
    --border: #26314a;
    --border-soft: #1c2740;
    --text: #e7ecf5;
    --text-muted: #8b96ac;
    --text-dim: #5c6884;
    --accent: #ff9900;
    --accent-dim: #7a5320;
    --cyan: #4fd1c5;
    --success: #34d399;
    --error: #f87171;
    --font-display: 'Space Grotesk', 'Noto Sans JP', sans-serif;
    --font-body: 'Noto Sans JP', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(255,153,0,0.07), transparent 40%),
      radial-gradient(circle at 100% 20%, rgba(79,209,197,0.06), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent); color:#0a0f1c;}
  button{font-family:inherit; cursor:pointer;}
  button:focus-visible, .choice-btn:focus-visible, .cat-card:focus-visible{
    outline:2px solid var(--cyan); outline-offset:2px;
  }
  a{color:var(--cyan);}

  .app{max-width:920px; margin:0 auto; padding:28px 20px 80px;}

  /* ---------- HEADER ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; margin-bottom:28px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:34px; height:34px; border-radius:8px;
    background:linear-gradient(135deg, var(--accent), #cc7a00);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-weight:700; font-size:13px; color:#0a0f1c;
    flex-shrink:0;
  }
  .brand-text{font-family:var(--font-display); font-weight:700; font-size:17px; letter-spacing:0.2px;}
  .brand-sub{font-family:var(--font-mono); font-size:11px; color:var(--text-dim); margin-top:1px;}
  .session-stat{
    font-family:var(--font-mono); font-size:12px; color:var(--text-muted);
    display:flex; gap:14px;
  }
  .session-stat b{color:var(--accent); font-weight:700;}

  .progress-wrap{
    height:4px; background:var(--border-soft); border-radius:2px; overflow:hidden; margin-bottom:32px;
  }
  .progress-bar{
    height:100%; background:linear-gradient(90deg, var(--accent), #ffbf5c);
    width:0%; transition:width .35s ease;
  }

  /* ---------- START SCREEN ---------- */
  .terminal-intro{
    font-family:var(--font-mono); font-size:13px; color:var(--cyan);
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:16px 18px; margin-bottom:26px;
  }
  .terminal-intro .prompt{color:var(--text-dim);}
  .terminal-intro .cursor{
    display:inline-block; width:7px; height:14px; background:var(--cyan);
    margin-left:2px; vertical-align:-2px; animation:blink 1.1s steps(2) infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  h1.hero-title{
    font-family:var(--font-display); font-weight:700; font-size:clamp(26px,4vw,38px);
    line-height:1.25; margin-bottom:10px; letter-spacing:-0.3px;
  }
  h1.hero-title span{color:var(--accent);}
  .hero-desc{color:var(--text-muted); font-size:14.5px; max-width:60ch; margin-bottom:30px;}

  .section-label{
    font-family:var(--font-mono); font-size:11px; color:var(--text-dim);
    letter-spacing:1.5px; text-transform:uppercase; margin-bottom:12px;
    display:flex; align-items:center; gap:8px;
  }
  .section-label::before{content:''; width:14px; height:1px; background:var(--border);}

  .cat-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
    gap:10px; margin-bottom:30px;
  }
  .cat-card{
    text-align:left; background:var(--panel); border:1px solid var(--border);
    border-left:3px solid var(--accent-color, var(--accent));
    border-radius:8px; padding:14px 14px; color:var(--text);
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
    position:relative;
  }
  .cat-card:hover{background:var(--panel-alt); transform:translateY(-1px);}
  .cat-card.selected{background:var(--panel-alt); box-shadow:0 0 0 1px var(--accent-color, var(--accent)) inset;}
  .cat-card .cat-code{
    font-family:var(--font-mono); font-size:10.5px; font-weight:700;
    color:var(--accent-color, var(--accent)); letter-spacing:1px; margin-bottom:6px; display:block;
  }
  .cat-card .cat-name{font-size:13.5px; font-weight:700; margin-bottom:4px;}
  .cat-card .cat-desc{font-size:11.5px; color:var(--text-muted); line-height:1.5;}
  .cat-card .cat-check{
    position:absolute; top:12px; right:12px; width:16px; height:16px; border-radius:50%;
    border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center;
    font-size:10px; color:transparent;
  }
  .cat-card.selected .cat-check{background:var(--accent-color,var(--accent)); border-color:var(--accent-color,var(--accent)); color:#0a0f1c;}

  .count-row{display:flex; align-items:center; gap:10px; margin-bottom:32px; flex-wrap:wrap;}
  .count-btn{
    background:var(--panel); border:1px solid var(--border); color:var(--text-muted);
    padding:8px 16px; border-radius:7px; font-size:13px; font-weight:500;
  }
  .count-btn.active{background:var(--accent); color:#0a0f1c; border-color:var(--accent); font-weight:700;}

  .start-btn{
    background:linear-gradient(135deg, var(--accent), #e68a00);
    color:#0a0f1c; font-weight:700; font-size:15px; padding:14px 30px;
    border:none; border-radius:9px; font-family:var(--font-display);
    box-shadow:0 8px 20px -8px rgba(255,153,0,0.5);
    transition:transform .12s ease;
  }
  .start-btn:hover{transform:translateY(-1px);}
  .start-btn:disabled{opacity:0.4; cursor:not-allowed; box-shadow:none;}

  /* ---------- QUIZ SCREEN ---------- */
  .quiz-card{
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    padding:28px 26px; margin-bottom:20px;
  }
  .q-meta{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;
  }
  .q-tag{
    font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:1px;
    color:var(--accent-color, var(--accent)); background:rgba(255,153,0,0.1);
    border:1px solid var(--accent-color, var(--accent)); border-radius:5px; padding:3px 9px;
  }
  .q-index{font-family:var(--font-mono); font-size:12px; color:var(--text-dim);}
  .q-text{font-size:17.5px; font-weight:700; line-height:1.65; margin-bottom:22px;}

  .choices{display:flex; flex-direction:column; gap:9px; margin-bottom:6px;}
  .choice-btn{
    text-align:left; background:var(--panel-alt); border:1px solid var(--border);
    border-radius:9px; padding:13px 16px; font-size:14.5px; color:var(--text);
    display:flex; gap:12px; align-items:flex-start; transition:border-color .12s ease, background .12s ease;
  }
  .choice-btn:hover:not(:disabled){border-color:var(--text-dim);}
  .choice-btn .choice-letter{
    font-family:var(--font-mono); font-weight:700; font-size:12px; color:var(--text-dim);
    flex-shrink:0; width:20px; height:20px; border-radius:5px; border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; margin-top:1px;
  }
  .choice-btn:disabled{cursor:default;}
  .choice-btn.correct{border-color:var(--success); background:rgba(52,211,153,0.08);}
  .choice-btn.correct .choice-letter{background:var(--success); color:#0a0f1c; border-color:var(--success);}
  .choice-btn.wrong{border-color:var(--error); background:rgba(248,113,113,0.08);}
  .choice-btn.wrong .choice-letter{background:var(--error); color:#0a0f1c; border-color:var(--error);}
  .choice-btn.dim{opacity:0.45;}

  /* explanation log panel — signature element */
  .log-panel{
    margin-top:18px; border-radius:10px; overflow:hidden; border:1px solid var(--border);
    animation:reveal .28s ease;
  }
  @keyframes reveal{from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);}}
  .log-head{
    background:var(--panel-alt); padding:8px 14px; display:flex; align-items:center; gap:8px;
    border-bottom:1px solid var(--border);
  }
  .log-dot{width:8px; height:8px; border-radius:50%;}
  .log-head .log-title{
    font-family:var(--font-mono); font-size:11.5px; color:var(--text-muted); margin-left:4px;
  }
  .log-head .verdict{
    margin-left:auto; font-family:var(--font-mono); font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px;
  }
  .verdict.ok{background:rgba(52,211,153,0.15); color:var(--success);}
  .verdict.ng{background:rgba(248,113,113,0.15); color:var(--error);}
  .log-body{background:#0c1220; padding:16px 18px 18px; font-family:var(--font-mono); font-size:13px; color:#c7d2e5;}
  .log-line{display:flex; gap:12px; margin-bottom:12px; align-items:flex-start;}
  .log-line:last-child{margin-bottom:0;}
  .log-line .ln{color:#3a4560; flex-shrink:0; user-select:none;}
  .log-line .lt{line-height:1.75;}
  .log-line.tip .lt{color:#ffcf87;}
  .log-line.tip .ln{color:#7a5320;}

  .next-row{display:flex; justify-content:flex-end; margin-top:20px;}
  .next-btn{
    background:var(--accent); color:#0a0f1c; font-weight:700; font-size:14px;
    padding:11px 22px; border:none; border-radius:8px; font-family:var(--font-display);
  }
  .next-btn:disabled{opacity:0.3; cursor:not-allowed;}

  /* ---------- END SCREEN ---------- */
  .result-hero{text-align:center; padding:20px 0 10px;}
  .result-score{
    font-family:var(--font-display); font-weight:700; font-size:clamp(48px,10vw,72px);
    color:var(--accent); line-height:1;
  }
  .result-score small{font-size:0.35em; color:var(--text-muted); font-weight:500;}
  .result-label{font-family:var(--font-mono); font-size:12.5px; color:var(--text-muted); margin-top:8px; letter-spacing:0.5px;}

  .cat-breakdown{margin:30px 0;}
  .breakdown-row{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
  .breakdown-name{font-size:12.5px; font-family:var(--font-mono); width:130px; flex-shrink:0; color:var(--text-muted);}
  .breakdown-track{flex:1; height:7px; background:var(--border-soft); border-radius:4px; overflow:hidden;}
  .breakdown-fill{height:100%; border-radius:4px;}
  .breakdown-frac{font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); width:38px; text-align:right;}

  .review-list{display:flex; flex-direction:column; gap:10px; margin-top:10px;}
  .review-item{
    background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--error);
    border-radius:8px; padding:12px 14px;
  }
  .review-item.was-correct{border-left-color:var(--success);}
  .review-q{font-size:13.5px; font-weight:700; margin-bottom:4px;}
  .review-meta{font-family:var(--font-mono); font-size:11px; color:var(--text-dim);}

  .restart-row{display:flex; gap:10px; justify-content:center; margin-top:34px; flex-wrap:wrap;}
  .ghost-btn{
    background:transparent; border:1px solid var(--border); color:var(--text-muted);
    padding:12px 22px; border-radius:8px; font-size:13.5px; font-weight:500;
  }
  .ghost-btn:hover{border-color:var(--text-dim); color:var(--text);}

  .hidden{display:none !important;}

  @media (max-width:560px){
    .quiz-card{padding:20px 16px;}
    .q-text{font-size:16px;}
    .breakdown-name{width:98px; font-size:11px;}
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">λ</div>
      <div>
        <div class="brand-text">AWS実務クイズ</div>
        <div class="brand-sub">practical-knowledge.exe</div>
      </div>
    </div>
    <div class="session-stat" id="sessionStat"></div>
  </div>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <!-- ============ START SCREEN ============ -->
  <div id="startScreen">
    <div class="terminal-intro">
      <span class="prompt">$</span> aws sts get-caller-identity <span class="prompt">&&</span> quiz --mode=practical<span class="cursor"></span>
    </div>

    <h1 class="hero-title">資格の暗記じゃなく、<span>現場で使える</span>AWSを。</h1>
    <p class="hero-desc">
      設問ごとに「なぜ正解か」「なぜ他の選択肢はダメか」「実務でのハマりどころ」まで解説します。
      対策したいカテゴリを選んで、実力チェックを始めましょう。
    </p>

    <div class="section-label">カテゴリを選択（複数選択可）</div>
    <div class="cat-grid" id="catGrid"></div>

    <div class="section-label">出題数</div>
    <div class="count-row" id="countRow"></div>

    <button class="start-btn" id="startBtn">クイズを開始する →</button>
  </div>

  <!-- ============ QUIZ SCREEN ============ -->
  <div id="quizScreen" class="hidden">
    <div class="quiz-card">
      <div class="q-meta">
        <span class="q-tag" id="qTag"></span>
        <span class="q-index" id="qIndex"></span>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="choices" id="choicesWrap"></div>
      <div id="logPanelWrap"></div>
    </div>
    <div class="next-row">
      <button class="next-btn" id="nextBtn" disabled>次の設問へ →</button>
    </div>
  </div>

  <!-- ============ END SCREEN ============ -->
  <div id="endScreen" class="hidden">
    <div class="result-hero">
      <div class="result-score" id="resultScore">0<small>/0</small></div>
      <div class="result-label" id="resultLabel">RESULT</div>
    </div>

    <div class="section-label">カテゴリ別 正答率</div>
    <div class="cat-breakdown" id="catBreakdown"></div>

    <div class="section-label">復習：間違えた設問</div>
    <div class="review-list" id="reviewList"></div>

    <div class="restart-row">
      <button class="start-btn" id="retryWrongBtn">間違えた問題だけ再挑戦</button>
      <button class="ghost-btn" id="restartBtn">最初からやり直す</button>
    </div>
  </div>

</div>

<script>
/* =========================================================
   カテゴリ定義
========================================================= */
const CATEGORIES = [
  {code:'IAM',   name:'IAM・セキュリティ',        color:'#ff9900', desc:'アクセス制御と権限設計の勘所'},
  {code:'EC2',   name:'EC2・コンピューティング',   color:'#38bdf8', desc:'インスタンス選定と運用設計'},
  {code:'VPC',   name:'VPC・ネットワーキング',     color:'#a78bfa', desc:'サブネット設計とトラフィック制御'},
  {code:'S3',    name:'S3・ストレージ',            color:'#34d399', desc:'ストレージクラスと権限管理'},
  {code:'RDS',   name:'RDS・データベース',         color:'#f472b6', desc:'可用性設計とバックアップ戦略'},
  {code:'LMD',   name:'Lambda・サーバーレス',      color:'#fbbf24', desc:'イベント駆動アーキテクチャ'},
  {code:'ELB',   name:'ELB・Auto Scaling',        color:'#22d3ee', desc:'負荷分散とスケーリング設計'},
  {code:'MON',   name:'監視・運用',                color:'#f87171', desc:'可観測性とトラブルシュート'},
  {code:'CST',   name:'コスト最適化',              color:'#facc15', desc:'料金モデルとコスト削減手法'},
  {code:'HA',    name:'可用性・耐障害性設計',       color:'#fb7185', desc:'冗長化とDR戦略、設計原則'},
];

/* =========================================================
   問題データ（各カテゴリ5問・計50問）
========================================================= */
const QUESTIONS = [
// ---------------- IAM ----------------
{cat:'IAM', q:'IAMポリシーの評価において、あるアクションに対して「Allow」を許可するポリシーと「Deny」を明示するポリシーが同時に存在する場合、最終的な評価結果はどうなりますか。',
 choices:['Allowが優先され、アクションは許可される','Denyが優先され、アクションは拒否される','後から評価されたポリシーが優先される','エラーとなりリクエスト自体が失敗する'],
 correct:1,
 exp:'IAMのポリシー評価は「明示的Denyが常に最優先」というルールで決まります。デフォルトは暗黙のDenyで、いずれかのポリシーにAllowがあれば許可されますが、明示的なDenyが1つでもあればAllowをすべて上書きします。',
 tip:'複数チームでポリシーを組み合わせる実務では、SCP（サービスコントロールポリシー）やパーミッションバウンダリで意図せずDenyがかかり「権限を付けたのにアクセスできない」という事故が頻発します。IAM Policy SimulatorやAccess Analyzerで評価結果を事前確認する習慣が重要です。'},

{cat:'IAM', q:'EC2上で動くアプリケーションがS3やDynamoDBにアクセスする必要がある場合、実務で推奨される認証情報の渡し方はどれですか。',
 choices:['IAMユーザーのアクセスキーをコード内にハードコーディングする','アクセスキーを環境変数に設定してデプロイする','IAMロールをEC2インスタンスプロファイルにアタッチする','ルートユーザーの認証情報をSecrets Managerに保存して参照する'],
 correct:2,
 exp:'EC2にIAMロールを割り当てると、インスタンスメタデータサービス経由で一時的な認証情報が自動発行・自動ローテーションされます。長期のアクセスキーを持ち回る必要がなく、漏えいリスクと管理コストの両方を下げられます。',
 tip:'アクセスキーのハードコーディングや環境変数への平文設定はGitHubへの誤コミットなどで漏えいする典型パターンです。「EC2・Lambda・ECSタスクにはロール、人間にはIAM Identity CenterのSSO」が現場の基本方針になります。'},

{cat:'IAM', q:'IAMユーザーとIAMロールの本質的な違いを最も正しく説明しているものはどれですか。',
 choices:['ロールは長期的な認証情報を持ち、ユーザーは一時的な認証情報を持つ','ユーザーは特定の個人やアプリに紐づく恒久的なID、ロールは誰でも一時的に引き受けられる権限セット','ロールはコンソールログイン専用、ユーザーはAPI専用の識別子である','機能的な違いはなく、命名の慣習が異なるだけである'],
 correct:1,
 exp:'IAMユーザーはパスワードやアクセスキーという恒久的な認証情報を持つ「誰か」を表すのに対し、IAMロールはそれ自体に認証情報を持たず、信頼されたエンティティ（EC2、Lambda、他アカウントのユーザーなど）が一時的に引き受ける権限の入れ物です。',
 tip:'クロスアカウントアクセスやフェデレーション認証（SSO、Cognito）はすべてロールの引き受け（AssumeRole）で成り立っています。「誰が」ではなく「今どの権限で動いているか」を切り替えられる点がロール設計の実務価値です。'},

{cat:'IAM', q:'KMSで暗号化されたS3オブジェクトに、あるIAMユーザーがアクセスできませんでした。原因の切り分けとして最も適切なのはどれですか。',
 choices:['S3バケットポリシーだけを確認すればよい','IAMユーザーのポリシーだけを確認すればよい','S3側の権限に加えて、KMSキーポリシーでそのユーザー（またはロール）にkms:Decrypt等が許可されているか確認する','KMSはS3と独立しているため、S3の権限確認だけで十分である'],
 correct:2,
 exp:'SSE-KMSで暗号化されたオブジェクトを復号するには、S3に対する権限（GetObject等）に加えて、KMSキー自体のキーポリシーおよびIAMポリシーの両方でkms:Decryptが許可されている必要があります。どちらか一方が欠けてもAccessDeniedになります。',
 tip:'カスタマー管理キー（CMK）を使う設計では「S3権限はOKなのにKMSキーポリシーに対象プリンシパルが入っていない」という事故が非常に多いです。CloudTrailでkms:Decryptの失敗イベントを確認するのが最短のデバッグ経路です。'},

{cat:'IAM', q:'AWSアカウントのルートユーザーに関する実務上のベストプラクティスとして正しいものはどれですか。',
 choices:['日常的な管理作業はルートユーザーで行い、権限不足を避ける','ルートユーザーには強力なMFAを設定し、日常業務ではIAMユーザーやIAM Identity Centerの管理者ロールを使う','ルートユーザーのアクセスキーを発行し、CI/CDパイプラインに設定しておく','ルートユーザーは削除できないため、パスワードは共有ドキュメントに記載しておく'],
 correct:1,
 exp:'ルートユーザーはアカウントの全権限を持ち、一部の操作（請求設定の一部変更やアカウント解約など）はルートユーザーでしかできません。だからこそ日常利用は避け、MFAを必須にした上で緊急時のみ使う「金庫の鍵」として扱うのが鉄則です。',
 tip:'ルートユーザーのアクセスキーは基本的に発行しない・発行済みなら削除するのが原則です。AWS Organizationsを使う場合はメンバーアカウントのルート認証情報を一元的にロックする仕組み（Root credentials management）も活用できます。'},

// ---------------- EC2 ----------------
{cat:'EC2', q:'常時稼働する本番Webサーバーで、1年以上使い続けることが確定している場合、最もコスト効率が良い購入オプションはどれですか。',
 choices:['オンデマンドインスタンス','スポットインスタンス','リザーブドインスタンスまたはSavings Plans','専有ホスト（Dedicated Host）'],
 correct:2,
 exp:'利用期間が確定している定常負荷には、1年または3年の利用コミットと引き換えに大幅割引を受けられるリザーブドインスタンスやSavings Plansが最適です。オンデマンド比で最大72%程度の割引が期待できます。',
 tip:'リザーブドインスタンスはインスタンスファミリー等に縛りがある一方、Savings Plansは時間あたりのコミット額に対して柔軟にインスタンスタイプやリージョンをまたいで適用できるため、変化する構成には後者が向いています。'},

{cat:'EC2', q:'頻繁に停止・再起動されるインスタンスで、再起動後もデータを保持する必要がある場合に使うべきストレージはどれですか。',
 choices:['インスタンスストア（Instance Store）','EBS（Elastic Block Store）','ローカルの一時ディスクのみ','ElastiCacheのメモリ'],
 correct:1,
 exp:'インスタンスストアは物理ホストに直結した高速な一時ストレージで、インスタンスの停止や終了とともにデータが消失します。永続化が必要なデータはネットワーク接続型のEBSボリュームに置く必要があります。',
 tip:'インスタンスストアは「消えてもよい一時データ（キャッシュ、スクラッチ領域）」の超高速I/O用途に限定して使うのが定石です。データ永続化要件があるにもかかわらずインスタンスストアを使ってしまう設計ミスは実務でも起こりがちです。'},

{cat:'EC2', q:'複数のEC2インスタンスに同じソフトウェア構成・セキュリティパッチ状態を素早く展開したい場合の実務的な方法として最も適切なものはどれですか。',
 choices:['毎回手動でSSHログインしてセットアップする','設定済みのゴールデンAMIを作成し、そこから起動テンプレート経由で展開する','全インスタンスに同じEBSスナップショットをアタッチするだけで済ませる','User Dataスクリプトだけに頼り、AMIは常にAWS標準のものを使う'],
 correct:1,
 exp:'必要なミドルウェアやエージェント、パッチを適用済みのゴールデンAMIを作成し、Auto Scalingの起動テンプレートやLaunch Configurationで使い回すことで、起動時間の短縮と構成の一貫性を両立できます。',
 tip:'ゴールデンAMIはEC2 Image Builderで定期的な自動更新パイプラインを組むのが現場標準です。User Dataだけに頼ると起動のたびにインストール処理が走り、起動が遅くなる上に外部リポジトリ障害の影響も受けやすくなります。'},

{cat:'EC2', q:'低レイテンシ・高スループットなノード間通信が必要なHPC（高性能計算）クラスタを構築する際に有効なEC2の機能はどれですか。',
 choices:['パブリックIPアドレスの自動割り当て','プレイスメントグループ（クラスタ配置戦略）','複数リージョンへの分散配置','スポットインスタンスの活用のみ'],
 correct:1,
 exp:'クラスタ配置戦略のプレイスメントグループは、インスタンスを同一AZ内の物理的に近いハードウェアにまとめて配置し、ノード間のネットワークレイテンシを最小化・スループットを最大化します。HPCや分散処理ワークロードに向いています。',
 tip:'プレイスメントグループには他に、障害分離を目的とした「分散配置」や、複数AZにまたがりつつラック分散もする「パーティション配置」があります。目的（性能重視かAZ内障害耐性重視か）に応じて使い分けます。'},

{cat:'EC2', q:'EC2インスタンスメタデータサービス（IMDS）のセキュリティを強化するために、現在AWSが推奨している設定はどれですか。',
 choices:['IMDSv1を使い続け、変更しない','トークンベースのIMDSv2を必須化し、IMDSv1を無効化する','メタデータサービス自体を完全に無効化して運用する','セキュリティグループでメタデータへの通信を全遮断する'],
 correct:1,
 exp:'IMDSv1はリクエストトークンを要求しないため、SSRF（サーバーサイドリクエストフォージェリ）脆弱性経由で一時認証情報を窃取されるリスクがあります。IMDSv2はセッショントークンを要求する方式で、この種の攻撃を大幅に軽減します。',
 tip:'実際に大規模な情報漏えい事故（例：あるSaaS企業のS3データ流出）がIMDSv1を悪用したSSRFで発生しています。EC2起動テンプレートで「メタデータオプション：トークン必須（IMDSv2のみ）」を強制するのが現在の標準的な防御策です。'},

// ---------------- VPC ----------------
{cat:'VPC', q:'セキュリティグループとネットワークACL（NACL）の違いについて、正しい説明はどれですか。',
 choices:['両方ともステートフルで、戻り通信は自動的に許可される','セキュリティグループはステートフル、NACLはステートレスで戻り通信も明示的にルールが必要','セキュリティグループはステートレス、NACLはステートフルである','どちらもサブネット単位でのみ設定できる'],
 correct:1,
 exp:'セキュリティグループはインスタンス（ENI）単位で適用され、ステートフルなので許可した通信への戻りパケットは自動的に通過します。一方NACLはサブネット単位でステートレスに動作するため、インバウンドを許可してもアウトバウンドの戻り通信を別途明示的に許可する必要があります。',
 tip:'NACLで「ポート443のインバウンドは許可したのに通信できない」という詰まりは、エフェメラルポート範囲（多くの場合1024-65535）のアウトバウンド許可を忘れているケースが典型です。基本はセキュリティグループで制御し、NACLは追加の防御層として広めのルールにするのが実務的です。'},

{cat:'VPC', q:'プライベートサブネット内のEC2インスタンスが、インターネット上のパッケージリポジトリから更新を取得する必要がありますが、外部からの直接アクセスは受け付けたくありません。適切な構成はどれですか。',
 choices:['インスタンスにパブリックIPを付与し、インターネットゲートウェイに直結する','パブリックサブネットにNATゲートウェイを配置し、プライベートサブネットのルートテーブルから経由させる','インターネットゲートウェイを直接プライベートサブネットにアタッチする','VPCピアリングでインターネットに接続する'],
 correct:1,
 exp:'NATゲートウェイをパブリックサブネットに配置し、プライベートサブネットのデフォルトルート（0.0.0.0/0）をそのNATゲートウェイに向けることで、インスタンス自体はプライベートIPのまま外向き通信だけを行えます。外部から内部への通信は発生しません。',
 tip:'NATゲートウェイはAZごとに配置しないと、AZ障害時に他AZのインスタンスの外向き通信まで止まる単一障害点になります。可用性要件が高い場合はAZごとにNATゲートウェイを冗長配置するのが定石です（コストとのトレードオフあり）。'},

{cat:'VPC', q:'10個以上のVPCを相互接続し、将来的にオンプレミス拠点とも接続する必要がある場合、VPCピアリングと比較してTransit Gatewayを選ぶ主な理由は何ですか。',
 choices:['Transit Gatewayの方が常に安価だから','VPCピアリングはフルメッシュ接続が必要で管理が複雑になるが、Transit Gatewayはハブ&スポーク型で一元管理できるから','VPCピアリングは異なるリージョン間で使用できないから','Transit Gatewayを使わないとVPC同士は通信できないから'],
 correct:1,
 exp:'VPCピアリングは推移的ルーティングができないため、N個のVPCを全接続するにはN(N-1)/2本のピア接続が必要でルート管理が急激に複雑化します。Transit Gatewayはハブとして機能し、各VPCやVPNをスポークとして1本ずつ接続するだけで済み、経路や接続ポリシーも一元管理できます。',
 tip:'Transit Gatewayはルートテーブルを複数持てるため、セグメント（例：本番用と検証用）ごとに到達可能な範囲を分離することも可能です。大規模なマルチアカウント環境ではAWS Network Firewallと組み合わせて中央集権的なトラフィック検査を行う構成もよく使われます。'},

{cat:'VPC', q:'EC2インスタンスからS3にアクセスする際、インターネットを経由せずにVPC内で完結させたい場合に使う機能はどれですか。',
 choices:['NATゲートウェイ経由でアクセスする','VPCエンドポイント（この場合はGateway型）を使う','パブリックサブネットに移動する','インターネットゲートウェイのルートを追加する'],
 correct:1,
 exp:'S3やDynamoDBはGateway型のVPCエンドポイントに対応しており、ルートテーブルにエンドポイント宛のルートを追加するだけで、インターネットを経由せずAWSのプライベートネットワーク内で通信が完結します。追加コストもかかりません。',
 tip:'S3・DynamoDB以外の多くのサービス（Systems Manager、KMS、ECRなど）はInterface型エンドポイント（PrivateLink）を使います。Gateway型は無料でルートテーブルベース、Interface型はENIベースで時間課金という違いを押さえておくと設計判断が速くなります。'},

{cat:'VPC', q:'マルチAZ構成のWebアプリケーションで、可用性を確保するためのサブネット設計として適切なものはどれですか。',
 choices:['1つのAZに全リソースをまとめ、サブネットだけ複数用意する','複数のAZにまたがってパブリック・プライベート両方のサブネットをそれぞれ用意し、ALBやAuto Scalingグループを複数AZに分散させる','パブリックサブネットは1つのAZのみに作成し、プライベートサブネットだけ複数AZに分散させる','VPCを複数リージョンにまたがって作成する'],
 correct:1,
 exp:'高可用性設計の基本は、最低2つ以上のAZにそれぞれパブリック／プライベートサブネットのペアを用意し、ALBやAuto Scalingグループ、RDSのMulti-AZなどをAZをまたいで配置することです。1つのAZ障害が全体停止に直結しない構成が目的です。',
 tip:'VPCは単一リージョン内のサービスなので、リージョンレベルの災害対策にはVPCを複数リージョンに用意し、Route 53などでフェイルオーバーする設計が別途必要になります。「AZ分散＝リージョン障害対策」ではない点に注意してください。'},

// ---------------- S3 ----------------
{cat:'S3', q:'アクセス頻度が低いが、アクセス時には即座に取得（ミリ秒単位）できる必要があるログアーカイブに最も適したS3ストレージクラスはどれですか。',
 choices:['S3 Standard','S3 Standard-IA（低頻度アクセス）','S3 Glacier Deep Archive','S3 Intelligent-Tiering（アクセスパターンが不明な場合）'],
 correct:1,
 exp:'S3 Standard-IAは、取得時のミリ秒単位のアクセスを維持しつつ、保存コストをStandardより抑えられるクラスです。低頻度だが即時アクセスが必要、というこの設問の要件に合致します。Glacier系は取得に数分〜数時間かかるため不適です。',
 tip:'アクセスパターンが読みづらい・変動する場合はIntelligent-Tieringが有効です。監視コストなしで自動的に頻度別階層へ移動してくれますが、少額の監視料金が発生する点も踏まえて選定します。ログのように「直近は良く見るが古いものは滅多に見ない」場合はライフサイクルルールでStandard→IA→Glacierへ段階的に移す設計が定番です。'},

{cat:'S3', q:'Amazon S3の現在の整合性モデルについて正しい説明はどれですか。',
 choices:['新規オブジェクトのPUT後、読み取りには数秒〜数分の遅延が生じる結果整合性しか提供されない','2020年以降、S3はPUT・DELETE・上書きを含むすべての操作に対して強い読み取り整合性を提供する','強い整合性はS3 Standardクラスでのみ提供され、他クラスは結果整合性のままである','整合性はリージョンをまたぐ場合のみ結果整合性になる'],
 correct:1,
 exp:'2020年12月のアップデートにより、S3はすべてのオブジェクト操作（新規PUT、上書き、削除）に対して自動的に強い読み取り整合性を提供するようになりました。追加料金や設定変更は不要です。',
 tip:'古い設計ドキュメントや書籍には「S3は結果整合性である」という前提で回避策（読み取り前に待機する、バージョニングで対応するなど）が書かれていることがありますが、現在は不要な複雑化になっている場合が多いです。最新の公式ドキュメントで前提を確認する癖をつけましょう。'},

{cat:'S3', q:'複数のAWSアカウントから同一のS3バケットへ、それぞれ異なる権限でアクセスさせたい場合、最も一般的で管理しやすい方法はどれですか。',
 choices:['バケット内のすべてのオブジェクトのACLを個別に設定する','バケットポリシーでプリンシパルごとに許可条件を定義する','バケットをパブリックにしてアクセス制御自体を放棄する','各アカウントに同じIAMユーザーを複製して共有する'],
 correct:1,
 exp:'バケットポリシーはリソースベースポリシーとして、どのプリンシパル（他アカウントのIAMロール等）に対してどの操作を許可するかを一括管理できます。クロスアカウントアクセスの制御はACLよりもバケットポリシーで行うのが現在の推奨です。',
 tip:'AWSは長期的にACLを非推奨化する方向で、新規バケットではデフォルトで「バケット所有者の強制（Object Ownership）」が有効になりACLが無効化されています。新規設計では原則ACLを使わず、バケットポリシーとIAMポリシーで権限管理する方針が推奨されます。'},

{cat:'S3', q:'古いログデータのストレージコストを削減するために、90日経過したオブジェクトをGlacierへ、365日経過後に削除するにはどうすればよいですか。',
 choices:['毎日バッチジョブでオブジェクトを手動移動・削除するLambdaを書く','S3ライフサイクルルールで移行（Transition）と失効（Expiration）のルールを設定する','S3バージョニングを有効にするだけで自動的に処理される','CloudFrontのキャッシュ設定で対応する'],
 correct:1,
 exp:'S3のライフサイクルルールを使えば、経過日数に応じたストレージクラス間の自動移行（Transition）と、一定期間後の自動削除（Expiration）をコード不要で設定できます。運用負荷もLambdaを自前実装するより大幅に低くなります。',
 tip:'頻繁に更新される小さなオブジェクトをGlacierに移行すると、最低保存期間（例：Glacierは90日）内の削除で早期削除料金が発生することがあります。ライフサイクル設計時はオブジェクトの更新頻度とサイズも考慮するとコスト事故を防げます。'},

{cat:'S3', q:'S3バケットの意図しない公開設定を防ぐために、AWSが提供している機能はどれですか。',
 choices:['S3 Transfer Acceleration','S3ブロックパブリックアクセス（Block Public Access）','S3 Select','S3 Batch Operations'],
 correct:1,
 exp:'S3ブロックパブリックアクセスは、アカウントレベルまたはバケットレベルで、パブリックACLやパブリックなバケットポリシーの適用自体をブロックする設定です。デフォルトで新規アカウント・新規バケットに対して有効になっています。',
 tip:'実務での情報漏えい事故の多くは「一時的に公開設定にしたまま戻し忘れた」ケースです。組織全体の方針としてAWS OrganizationsのSCPでブロックパブリックアクセスの解除自体を禁止する、Config RuleやTrusted Advisorで定期監査するといった多層的な対策が有効です。'},

// ---------------- RDS ----------------
{cat:'RDS', q:'RDSのMulti-AZ配置とリードレプリカの主な目的の違いとして正しいものはどれですか。',
 choices:['Multi-AZは読み取りスケーリングが目的、リードレプリカは高可用性が目的である','Multi-AZは高可用性（フェイルオーバー）が目的、リードレプリカは読み取りスケーリングが目的である','両者はまったく同じ機能であり、名称が違うだけである','Multi-AZはNoSQLのみ、リードレプリカはRDBMSのみに提供される'],
 correct:1,
 exp:'Multi-AZはスタンバイインスタンスへの同期レプリケーションを行い、障害時に自動フェイルオーバーして可用性を高める仕組みです。一方リードレプリカは非同期レプリケーションで、読み取りトラフィックを複数インスタンスに分散させてスケーラビリティを高める仕組みです。',
 tip:'両者は併用可能で、本番運用ではMulti-AZで可用性を確保しつつ、リージョンまたぐリードレプリカでレポーティング用途や参照系負荷を逃がす構成がよく使われます。リードレプリカは通常フェイルオーバー先として自動的には使われない点にも注意が必要です（昇格には手動操作が必要）。'},

{cat:'RDS', q:'RDSで「昨日の午後3時時点のデータベース状態」に復元する必要が生じました。利用すべき機能はどれですか。',
 choices:['手動スナップショットが取得されていれば必ず復元できる','自動バックアップとトランザクションログを利用したポイントインタイムリカバリ（PITR）','リードレプリカを昇格させる','マルチAZのフェイルオーバーを実行する'],
 correct:1,
 exp:'自動バックアップが有効な場合、RDSは保持期間内の任意の秒単位の時点にポイントインタイムリカバリ（PITR）で復元できます。手動スナップショットは取得したその瞬間の状態にしか戻せず、任意の時刻指定はできません。',
 tip:'PITRで作られるのは新しいDBインスタンスであり、既存インスタンスがその時点に巻き戻るわけではない点は要注意です。復元後にエンドポイントの切り替えやアプリケーション側の接続先変更が必要になるため、事前に復旧手順書として整理しておくと障害対応がスムーズになります。'},

{cat:'RDS', q:'Amazon Auroraが従来のRDS for MySQL/PostgreSQLと比較して優れている代表的な特徴はどれですか。',
 choices:['オンプレミス専用のデータベースエンジンである','ストレージが自動的にAZをまたいで6つのコピーに複製され、高いスループットと耐障害性を持つ','課金体系が完全に無料である','水平スケーリングを一切サポートしない'],
 correct:1,
 exp:'Auroraはストレージ層がコンピュートから分離された分散アーキテクチャで、データを3つのAZに6重に複製します。これにより高いスループット・自動的なストレージ拡張・高速なフェイルオーバー・クラッシュリカバリ性能を実現しています。',
 tip:'Auroraにはさらにサーバーレス版（Aurora Serverless v2）もあり、負荷変動が激しいワークロードで自動的にキャパシティをスケールできます。ライセンス費用が不要なMySQL/PostgreSQL互換エンジンという位置づけも、既存資産の移行しやすさという点で実務上の採用理由になっています。'},

{cat:'RDS', q:'DynamoDBで、トラフィック量が予測しづらく急激なスパイクも発生しうるアプリケーションに適したキャパシティモードはどれですか。',
 choices:['プロビジョンドキャパシティ（固定値のみ）で余裕を持って高めに設定する','オンデマンドキャパシティモード','キャパシティモードは存在せず、常に無制限である','DynamoDBを使わずRDSに変更する'],
 correct:1,
 exp:'オンデマンドキャパシティモードは、事前のキャパシティプランニングなしにリクエスト量に応じて自動的にスケールし、実際に使った分だけ課金されます。トラフィック予測が難しいワークロードや新規サービスの立ち上げ初期に向いています。',
 tip:'安定した予測可能なトラフィックがある場合は、プロビジョンドキャパシティ＋Auto Scalingの方がオンデマンドよりコストを抑えられることが多いです。運用が安定してきた段階でCloudWatchのメトリクスを見ながらモード切り替えを検討するのが実務的なコスト最適化の流れです。'},

{cat:'RDS', q:'多数のLambda関数が短時間の同時実行でRDSに接続し、「too many connections」エラーが頻発しています。有効な対策はどれですか。',
 choices:['RDSインスタンスサイズを無限に大きくし続ける','RDS Proxyを導入してコネクションプーリングを行う','Lambdaの同時実行数の上限を設定しないようにする','データベースの最大接続数設定を削除する'],
 correct:1,
 exp:'RDS Proxyはアプリケーションとデータベースの間でコネクションプールを管理するマネージドサービスです。Lambdaのように短命で大量の接続を生成しがちなクライアントからの接続を集約し、バックエンドDBへの実接続数を抑えられます。',
 tip:'RDS Proxyの導入はコード変更を最小限（エンドポイントの向き先変更程度）に抑えられるのも利点です。加えてIAM認証との統合やフェイルオーバー時の接続維持といった副次的なメリットもあり、サーバーレス構成でRDSを使う場合は事実上の標準対策になっています。'},

// ---------------- LAMBDA ----------------
{cat:'LMD', q:'Lambda関数のコールドスタートによるレイテンシが問題になっている場合の実務的な対策として適切なものはどれですか。',
 choices:['関数のメモリ設定を極端に減らす','Provisioned Concurrency（プロビジョニング済み同時実行）を設定する','タイムアウト値を短くする','VPC接続を必ず追加する'],
 correct:1,
 exp:'Provisioned Concurrencyは、事前に指定数の実行環境を初期化した状態で待機させておく機能で、コールドスタートを回避し常に一定の低レイテンシで応答できます。追加コストと引き換えにレイテンシSLAを満たしたい場合に有効です。',
 tip:'メモリ設定を増やすとCPU割り当ても比例して増えるため、実行時間の短縮によって結果的にコストが下がるケースもあります。VPC接続はENIアタッチのオーバーヘッドでコールドスタートを悪化させる要因になり得るため、不要な場合は接続しない設計が推奨されます（近年は改善されていますが依然考慮点です）。'},

{cat:'LMD', q:'あるLambda関数が下流のRDSに急激な接続増加で負荷をかけないよう、同時実行数を制御したい場合に使う設定はどれですか。',
 choices:['予約済み同時実行数（Reserved Concurrency）','関数のタイムアウト値','デッドレターキュー（DLQ）','Lambdaレイヤー'],
 correct:0,
 exp:'予約済み同時実行数を設定すると、その関数が同時に実行できるインスタンス数の上限を固定できます。これにより下流システム（RDSなど接続数に制約があるリソース）への負荷を一定以下に抑えられます。',
 tip:'予約済み同時実行数を設定すると、アカウント全体の未予約プールからその分が差し引かれる点に注意が必要です。他の関数の実行余地を圧迫しないよう、アカウント全体の同時実行数上限（デフォルト1000、緩和申請可能）とのバランスを見て設計します。'},

{cat:'LMD', q:'複数のLambda関数を順序立てて実行し、途中でエラー時のリトライや条件分岐、人の承認待ちも組み込みたい場合に適したサービスはどれですか。',
 choices:['Amazon SQSのみで実現する','AWS Step Functionsでステートマシンを構築する','CloudWatch Eventsのルールだけで対応する','Lambda関数同士を直接同期呼び出しでチェーンする'],
 correct:1,
 exp:'Step Functionsはステートマシンとしてワークフローを視覚的に定義でき、リトライ・エラーハンドリング・並列実行・条件分岐・人手承認待ち（コールバックパターン）などを組み込みで扱えます。Lambdaの直接チェーンは可観測性が低く、エラー処理も自前実装になりがちです。',
 tip:'Lambda同士を同期呼び出しで直接つなぐと、呼び出し元が呼び出し先の完了を待つ間も課金され続け、コストとタイムアウト管理が複雑化します。Step FunctionsのExpressワークフローは高頻度・短時間の処理に最適化されており、用途に応じてStandard/Expressを使い分けます。'},

{cat:'LMD', q:'Lambda関数のコストとパフォーマンスの関係について正しい説明はどれですか。',
 choices:['メモリ設定を増やすとコストは上がるが、CPU性能には影響しない','課金は常にメモリ設定量に比例するだけで、実行時間は無関係である','メモリ設定を増やすとCPU割り当ても増加するため、処理時間短縮により合計コストが下がる場合がある','Lambdaは実行時間に関わらず定額課金である'],
 correct:2,
 exp:'Lambdaの料金はメモリ設定量×実行時間で決まります。メモリを増やすとCPU割り当ても比例して増えるため、CPUバウンドな処理では実行時間が大幅に短縮され、結果としてメモリ単価は上がっても合計コストが下がることがあります。',
 tip:'AWS Lambda Power Tuningというオープンソースツールを使うと、様々なメモリ設定で実際に関数を実行し、コストと実行時間のバランスが最適な設定値を自動的に見つけられます。「とりあえず128MB」は多くの場合最適解ではありません。'},

{cat:'LMD', q:'SQSキューにメッセージが溜まったらLambdaで処理したい場合、標準的な連携方法はどれですか。',
 choices:['LambdaからSQSに定期的にポーリングするCronを自作する','Lambdaのイベントソースマッピングを使ってSQSキューをトリガーに設定する','SNSを経由せずには連携できない','SQSはLambdaと統合できないためEC2で処理する必要がある'],
 correct:1,
 exp:'Lambdaのイベントソースマッピング機能は、SQSキューを内部的にポーリングし、メッセージが到着すると自動的にLambda関数を呼び出します。ポーリングロジックを自前実装する必要はありません。',
 tip:'処理に失敗したメッセージは、SQS側の再試行ポリシーとデッドレターキュー（DLQ）の設定で扱います。バッチサイズや最大同時実行数を調整することで、下流システムへの負荷とスループットのバランスを取るのが実務でのチューニングポイントです。'},

// ---------------- ELB / Auto Scaling ----------------
{cat:'ELB', q:'HTTPリクエストの内容（パスやホストヘッダー）に基づいてルーティング先を切り替えたいマイクロサービス構成に適したロードバランサーはどれですか。',
 choices:['Classic Load Balancer（CLB）','Network Load Balancer（NLB）','Application Load Balancer（ALB）','Gateway Load Balancer（GWLB）'],
 correct:2,
 exp:'ALBはL7（アプリケーション層）で動作し、パスベースやホストベースのルーティング、HTTPヘッダーやクエリ文字列に基づく高度なルーティングルールをサポートします。マイクロサービスやコンテナベースのアーキテクチャに広く使われます。',
 tip:'超低レイテンシ・高スループットが求められるTCP/UDPトラフィック（ゲームサーバーや金融取引システムなど）にはNLBが適しています。GWLBはサードパーティ製のセキュリティアプライアンス（ファイアウォール等）をトラフィックパスに透過的に挿入する用途に特化しています。'},

{cat:'ELB', q:'Auto Scalingのスケーリングポリシーのうち、CPU使用率を常に50%前後に保つよう自動調整したい場合に最も適したポリシーはどれですか。',
 choices:['シンプルスケーリング（Simple Scaling）','ステップスケーリング（Step Scaling）','ターゲット追跡スケーリング（Target Tracking Scaling）','スケジュールされたアクション（Scheduled Actions）'],
 correct:2,
 exp:'ターゲット追跡スケーリングは、指定したメトリクス（例：平均CPU使用率50%）を維持するように、CloudWatchアラームとスケーリング量の計算をAWS側が自動で行ってくれるポリシーです。閾値やステップ幅を手動設計する必要がありません。',
 tip:'突発的な負荷増加が予測できる場合（例：セール開始時刻）は、スケジュールされたアクションを併用して事前にキャパシティを増強しておくと、ターゲット追跡の反応遅れによる一時的な性能劣化を防げます。複数ポリシーの併用も一般的です。'},

{cat:'ELB', q:'ALBのターゲットグループに登録されたインスタンスが実際には正常に稼働しているのに「Unhealthy」と判定され続けています。確認すべき点として適切なものはどれですか。',
 choices:['インスタンスのOSを再インストールする','ヘルスチェックパスへのアクセスがセキュリティグループやアプリケーション側で正しく応答を返しているか確認する','ALBを削除して作り直す以外に方法はない','ヘルスチェックの設定は一度決めたら変更できない'],
 correct:1,
 exp:'ヘルスチェックの失敗は、指定したパスへのHTTPリクエストが期待するステータスコードを返していない、セキュリティグループがALBのヘルスチェック用トラフィックをブロックしている、といった設定ミスが典型的な原因です。まずヘルスチェックパスへの実際の応答を確認するのが基本的な切り分け手順です。',
 tip:'アプリケーションの起動に時間がかかる場合は、正常しきい値や間隔、タイムアウトの設定が短すぎて起動途中に失敗判定されてしまうこともあります。デプロイ直後の挙動をCloudWatchやターゲットグループのヘルス状態画面で観察し、しきい値を調整するのが実務的な対応です。'},

{cat:'ELB', q:'ECサイトでユーザーのショッピングカート情報をサーバー側セッションで保持しており、同じユーザーは常に同じバックエンドインスタンスに接続させたい場合に使う機能はどれですか。',
 choices:['クロスゾーン負荷分散','スティッキーセッション（セッションアフィニティ）','ヘルスチェックの間隔短縮','デレジストレーション遅延の無効化'],
 correct:1,
 exp:'スティッキーセッションは、ALBが発行するCookie（またはアプリケーション側のCookie）を使って同一クライアントからのリクエストを可能な限り同じターゲットへ送り続ける機能です。サーバー側にセッション状態を持つ設計で有効です。',
 tip:'スティッキーセッションは特定インスタンスへの負荷偏在やスケールイン時のセッション切断のリスクを伴います。可能であればセッション情報をElastiCacheやDynamoDBなど外部ストアに切り出し、どのインスタンスでも処理できる「ステートレス」な設計にする方が長期的にはスケーラブルです。'},

{cat:'ELB', q:'Auto Scalingグループでスケールインが発生する際、処理中のリクエストを中断させずに安全にインスタンスを削除するための仕組みはどれですか。',
 choices:['即座に強制終了（Terminate）する設定にする','コネクションドレイニング（デレジストレーション遅延）を設定し、処理完了を待ってから終了する','スケールインを完全に無効化する','ヘルスチェックを無効化してエラーを見えなくする'],
 correct:1,
 exp:'デレジストレーション遅延（コネクションドレイニング）を設定すると、ターゲットグループから登録解除されたインスタンスへの新規リクエスト送信は止めつつ、処理中の既存リクエストが完了するまで一定時間インスタンスを生かしておけます。突然の接続切断によるエラーを防げます。',
 tip:'Auto Scalingのライフサイクルフックと組み合わせると、インスタンス終了前にログの退避やアプリケーションの正常シャットダウン処理（グレースフルシャットダウン）を挟むことも可能です。ステートを持つワークロードのスケールインでは特に重要な考慮点です。'},

// ---------------- 監視・運用 ----------------
{cat:'MON', q:'CloudWatch LogsとCloudWatch Metricsの役割の違いとして正しい説明はどれですか。',
 choices:['Logsは数値の時系列データ、Metricsはテキストログを保存する','Logsはアプリケーションやシステムのテキストログを保存・検索する用途、Metricsは数値の時系列データを集計・監視する用途','両者は完全に同一機能で名前が違うだけ','Metricsは無料だがLogsは常に高額な課金が発生する'],
 correct:1,
 exp:'CloudWatch Logsはアプリケーションログやシステムログといったテキストデータの収集・保存・検索（Logs Insightsによるクエリ）を担当します。一方CloudWatch Metricsは、CPU使用率やリクエスト数などの数値データを時系列で記録し、アラームのトリガーやダッシュボード表示に使います。',
 tip:'ログからメトリクスフィルターを使って特定パターン（例：ERRORログの出現回数）をメトリクス化し、それに対してアラームを設定するという組み合わせ技もよく使われます。ログとメトリクスは別物ですが、両者を繋ぐことで運用上のアラート設計の幅が広がります。'},

{cat:'MON', q:'「いつ・誰が・どのAPIを呼び出したか」という監査証跡を追跡する必要がある場合に確認すべきサービスはどれですか。',
 choices:['Amazon CloudWatch','AWS CloudTrail','AWS Config','Amazon Inspector'],
 correct:1,
 exp:'CloudTrailはAWSアカウント内で行われたAPIコールを記録するサービスで、誰が（IAMプリンシパル）、いつ、どのリソースに対して、どんな操作を行ったかという監査証跡を提供します。セキュリティインシデントの調査やコンプライアンス対応の基盤になります。',
 tip:'似た名前でよく混同されるAWS Configは「リソースの設定状態がどう変化したか」を追跡・評価するサービスで、CloudTrailの「操作の記録」とは目的が異なります。実務ではCloudTrailで「誰が変更したか」、Configで「何がどう変わったか・ルール違反していないか」を組み合わせて調査します。'},

{cat:'MON', q:'マイクロサービス間のリクエストがどこで遅延しているかを可視化し、ボトルネックを特定したい場合に使うサービスはどれですか。',
 choices:['AWS X-Ray','Amazon SNS','AWS Direct Connect','Amazon Route 53'],
 correct:0,
 exp:'AWS X-Rayはリクエストがサービス間をどう伝播したかをトレースし、各セグメントの処理時間を可視化する分散トレーシングサービスです。「どのサービスで遅延が発生しているか」をサービスマップとして把握できます。',
 tip:'X-Rayを効果的に使うには、Lambda・ECS・EC2の各所にX-Ray SDKやデーモンを組み込み、サービス間で伝播するトレースIDを一貫させる必要があります。導入時にはトレーシングのサンプリングレートを調整し、コストと可観測性のバランスを取ることも実務上のポイントです。'},

{cat:'MON', q:'本番環境でエラー率が急上昇した際にオンコール担当者へ即座に通知したい場合の典型的な構成はどれですか。',
 choices:['手動でCloudWatchのダッシュボードを定期的に目視確認する','CloudWatchアラームを設定し、SNS経由でChatOpsツールやページャーサービスに通知する','ログファイルを定期的にダウンロードして確認する','特に仕組みを作らず、ユーザーからの問い合わせを待つ'],
 correct:1,
 exp:'CloudWatchアラームでエラー率などのメトリクスに閾値を設定し、しきい値超過時にSNSトピックへ通知、そこからSlackなどのChatOpsツールやPagerDuty等のインシデント管理ツールに連携するのが典型的な自動監視構成です。人手による目視確認は検知の遅れに直結します。',
 tip:'アラームの閾値やデータポイント数（「5分間に3回連続で超過」など）の設計次第で、誤検知（アラート疲れ）と検知漏れのバランスが変わります。複合アラーム（Composite Alarm）を使って複数条件を組み合わせ、ノイズの多い単純なアラートを減らす工夫も実務で重要です。'},

{cat:'MON', q:'AWS側の大規模障害情報を、自社アカウントで使っているリソースへの影響有無まで含めて確認したい場合に見るべき情報源はどれですか。',
 choices:['AWS Service Health Dashboard（一般公開ステータス）のみで十分','AWS Health Dashboard（Personal Health Dashboard）で自アカウントのリソースへの影響通知を確認する','Twitter（X）の非公式アカウントの投稿を待つ','障害発生時はサポートに電話するまで何も分からない'],
 correct:1,
 exp:'AWS Health Dashboard（旧Personal Health Dashboard）は、一般公開のService Health Dashboardとは別に、自アカウントで実際に使用しているリソースに影響する事象だけをパーソナライズして通知してくれます。障害範囲の特定や対応の優先度判断に直結します。',
 tip:'AWS Health イベントはEventBridge経由で自動化ワークフロー（Slack通知、自動フェイルオーバートリガーなど）に組み込むこともできます。障害検知を人間の巡回に頼らず、イベント駆動で仕組み化しておくと初動対応が大幅に速くなります。'},

// ---------------- コスト最適化 ----------------
{cat:'CST', q:'複数のインスタンスファミリーやリージョンをまたいで柔軟にコミット割引を適用したい場合、リザーブドインスタンスよりSavings Plansが優れている点はどれですか。',
 choices:['Savings Plansは購入後にインスタンスファミリーやOSを問わず柔軟に適用範囲が及ぶ（Compute Savings Plansの場合）','Savings Plansは常にリザーブドインスタンスより割引率が高い','Savings Plansはオンデマンドと同額なので実質的な意味がない','Savings PlansはEC2にしか適用できない'],
 correct:0,
 exp:'Compute Savings Plansは、インスタンスファミリー・サイズ・OS・リージョンを問わず、EC2・Fargate・Lambdaの利用に対して時間あたりのコミット額に応じた割引を自動適用します。リザーブドインスタンスのように特定条件に縛られないため、構成変更が多い環境でも柔軟に活用できます。',
 tip:'割引率だけを見るとEC2 Instance Savings Plansやリザーブドインスタンスの方が高いこともあります。「割引率の高さ」と「柔軟性」はトレードオフなので、ワークロードの変化しやすさに応じて組み合わせるのが実務でのコスト最適化の考え方です。'},

{cat:'CST', q:'月々のAWS利用料金が想定を超えて増加していないか、事前に検知したい場合に使うべきサービスはどれですか。',
 choices:['AWS Budgets','Amazon GuardDuty','AWS Shield','AWS WAF'],
 correct:0,
 exp:'AWS Budgetsは予算額を設定し、実績や予測がその閾値を超えそうな場合にアラートを送るサービスです。Cost Explorerが「過去の使用状況の分析」に強いのに対し、Budgetsは「今後の予算超過を未然に検知する」役割を担います。',
 tip:'Budgetsはコスト以外にも使用量（Usage）やRI/Savings Plansのカバレッジ・利用率に対しても設定できます。アラートをSNS経由でLambdaに繋ぎ、閾値超過時に自動的に非本番環境のインスタンスを停止する、といった自動コストガードレールを組む構成も実務でよく見られます。'},

{cat:'CST', q:'バッチ処理やCI/CDのビルドジョブのように、中断されても再実行できる処理でコストを大幅に削減したい場合に検討すべきEC2の購入オプションはどれですか。',
 choices:['オンデマンドインスタンス','スポットインスタンス','専有インスタンス（Dedicated Instance）','3年前払いのリザーブドインスタンス'],
 correct:1,

/* =========================================================
   状態管理
========================================================= */
const state = {
  quiz: [],       // 出題中の設問配列（シャッフル済み選択肢を含む）
  idx: 0,
  score: 0,
  answers: [],    // {question, chosenIdx, correctIdx, isCorrect}
  selectedCats: new Set(CATEGORIES.map(c => c.code)),
  count: 10,
};

const catByCode = Object.fromEntries(CATEGORIES.map(c => [c.code, c]));

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* =========================================================
   START SCREEN 描画
========================================================= */
function renderCatGrid(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-card' + (state.selectedCats.has(cat.code) ? ' selected' : '');
    btn.style.setProperty('--accent-color', cat.color);
    btn.innerHTML = `
      <span class="cat-check">✓</span>
      <span class="cat-code">[${cat.code}]</span>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-desc">${cat.desc}</div>
    `;
    btn.addEventListener('click', () => {
      if(state.selectedCats.has(cat.code)){
        if(state.selectedCats.size > 1) state.selectedCats.delete(cat.code);
      } else {
        state.selectedCats.add(cat.code);
      }
      renderCatGrid();
    });
    grid.appendChild(btn);
  });
}

function renderCountRow(){
  const row = document.getElementById('countRow');
  row.innerHTML = '';
  [5,10,20,'all'].forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'count-btn' + (state.count === n ? ' active' : '');
    btn.textContent = n === 'all' ? '全問' : `${n}問`;
    btn.addEventListener('click', () => { state.count = n; renderCountRow(); });
    row.appendChild(btn);
  });
}

document.getElementById('startBtn').addEventListener('click', () => {
  const pool = QUESTIONS.filter(q => state.selectedCats.has(q.cat));
  const shuffledPool = shuffle(pool);
  const n = state.count === 'all' ? shuffledPool.length : Math.min(state.count, shuffledPool.length);
  const picked = shuffledPool.slice(0, n);

  state.quiz = picked.map(q => buildRuntimeQuestion(q));
  state.idx = 0;
  state.score = 0;
  state.answers = [];

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  renderQuestion();
});

function buildRuntimeQuestion(q){
  const order = shuffle(q.choices.map((_,i)=>i));
  const newChoices = order.map(i => q.choices[i]);
  const newCorrect = order.indexOf(q.correct);
  return { ...q, choices:newChoices, correct:newCorrect };
}

/* =========================================================
   QUIZ SCREEN 描画
========================================================= */
function renderQuestion(){
  const q = state.quiz[state.idx];
  const cat = catByCode[q.cat];

  document.getElementById('progressBar').style.width = `${(state.idx/state.quiz.length)*100}%`;
  document.getElementById('sessionStat').innerHTML = `<span>正答 <b>${state.score}</b> / ${state.idx}</span>`;

  const qTag = document.getElementById('qTag');
  qTag.textContent = `[${q.cat}] ${cat.name}`;
  qTag.style.setProperty('--accent-color', cat.color);
  qTag.style.color = cat.color;
  qTag.style.borderColor = cat.color;
  qTag.style.background = cat.color + '1a';

  document.getElementById('qIndex').textContent = `Q ${state.idx+1} / ${state.quiz.length}`;
  document.getElementById('qText').textContent = q.q;

  const wrap = document.getElementById('choicesWrap');
  wrap.innerHTML = '';
  const letters = ['A','B','C','D','E','F'];
  q.choices.forEach((choiceText, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[i]}</span><span>${choiceText}</span>`;
    btn.addEventListener('click', () => selectAnswer(i));
    wrap.appendChild(btn);
  });

  document.getElementById('logPanelWrap').innerHTML = '';
  document.getElementById('nextBtn').disabled = true;
}

function selectAnswer(chosenIdx){
  const q = state.quiz[state.idx];
  const isCorrect = chosenIdx === q.correct;
  if(isCorrect) state.score++;

  state.answers.push({ q, chosenIdx, isCorrect });

  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if(i === q.correct) btn.classList.add('correct');
    else if(i === chosenIdx) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });

  const cat = catByCode[q.cat];
  const logWrap = document.getElementById('logPanelWrap');
  logWrap.innerHTML = `
    <div class="log-panel">
      <div class="log-head">
        <span class="log-dot" style="background:#f87171"></span>
        <span class="log-dot" style="background:#fbbf24"></span>
        <span class="log-dot" style="background:#34d399"></span>
        <span class="log-title">$ explain --detail --category=${q.cat}</span>
        <span class="verdict ${isCorrect ? 'ok' : 'ng'}">${isCorrect ? 'CORRECT' : 'INCORRECT'}</span>
      </div>
      <div class="log-body">
        <div class="log-line"><span class="ln">01</span><span class="lt">${q.exp}</span></div>
        <div class="log-line tip"><span class="ln">02</span><span class="lt">💡 実務ポイント: ${q.tip}</span></div>
      </div>
    </div>
  `;

  document.getElementById('sessionStat').innerHTML = `<span>正答 <b>${state.score}</b> / ${state.idx+1}</span>`;
  document.getElementById('nextBtn').disabled = false;
}

document.getElementById('nextBtn').addEventListener('click', () => {
  state.idx++;
  if(state.idx >= state.quiz.length){
    renderEnd();
  } else {
    renderQuestion();
  }
});

/* =========================================================
   END SCREEN 描画
========================================================= */
function renderEnd(){
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('progressBar').style.width = '100%';

  const total = state.quiz.length;
  document.getElementById('resultScore').innerHTML = `${state.score}<small>/${total}</small>`;
  const pct = Math.round((state.score/total)*100);
  let label = 'まずは基礎の見直しから';
  if(pct >= 90) label = '実務レベル、申し分ありません';
  else if(pct >= 70) label = 'かなり良い理解度です';
  else if(pct >= 50) label = 'あと一歩、弱点を復習しましょう';
  document.getElementById('resultLabel').textContent = `正答率 ${pct}% — ${label}`;

  const byCat = {};
  state.answers.forEach(a => {
    const c = a.q.cat;
    byCat[c] = byCat[c] || {correct:0, total:0};
    byCat[c].total++;
    if(a.isCorrect) byCat[c].correct++;
  });

  const breakdown = document.getElementById('catBreakdown');
  breakdown.innerHTML = '';
  Object.keys(byCat).sort().forEach(code => {
    const cat = catByCode[code];
    const stat = byCat[code];
    const p = Math.round((stat.correct/stat.total)*100);
    const row = document.createElement('div');
    row.className = 'breakdown-row';
    row.innerHTML = `
      <div class="breakdown-name">[${code}] ${cat.name}</div>
      <div class="breakdown-track"><div class="breakdown-fill" style="width:${p}%; background:${cat.color}"></div></div>
      <div class="breakdown-frac">${stat.correct}/${stat.total}</div>
    `;
    breakdown.appendChild(row);
  });

  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = '';
  const wrongOnes = state.answers.filter(a => !a.isCorrect);
  if(wrongOnes.length === 0){
    reviewList.innerHTML = `<div style="color:var(--text-muted); font-size:13.5px;">全問正解でした。復習の必要はありません。</div>`;
  } else {
    wrongOnes.forEach(a => {
      const item = document.createElement('div');
      item.className = 'review-item';
      item.innerHTML = `
        <div class="review-meta">[${a.q.cat}] ${catByCode[a.q.cat].name}</div>
        <div class="review-q">${a.q.q}</div>
        <div style="font-size:12.5px; color:var(--text-muted); margin-top:6px;">正解: ${a.q.choices[a.q.correct]}</div>
      `;
      reviewList.appendChild(item);
    });
  }

  document.getElementById('retryWrongBtn').classList.toggle('hidden', wrongOnes.length === 0);
}

document.getElementById('retryWrongBtn').addEventListener('click', () => {
  const wrongSourceQs = state.answers.filter(a => !a.isCorrect).map(a => {
    // 元のQUESTIONSから同一設問を探し、選択肢を再シャッフルして出題し直す
    return QUESTIONS.find(q => q.q === a.q.q);
  });
  state.quiz = shuffle(wrongSourceQs).map(q => buildRuntimeQuestion(q));
  state.idx = 0;
  state.score = 0;
  state.answers = [];
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  renderQuestion();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('sessionStat').innerHTML = '';
});

/* =========================================================
   初期化
========================================================= */
renderCatGrid();
renderCountRow();
</script>
</body>
